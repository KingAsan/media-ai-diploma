<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>История запросов</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .card-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 5px solid #2575fc;
        }
        .meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .query {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
        }
        .response {
            background-color: #2d2d2d;
            padding: 10px;
            border-radius: 8px;
            color: #ddd;
            line-height: 1.5;
            white-space: pre-wrap; /* Сохраняет переносы строк */
        }
        .back-btn {
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            transition: 0.2s;
        }
        .back-btn:hover { background: #444; }
    </style>
</head>
<body>

    <a href="/" class="back-btn">← Назад в чат</a>
    <h1>История рекомендаций</h1>

    <div class="card-container" id="historyList">
        <div style="text-align:center; color:#888;">Загрузка...</div>
    </div>

    <script>
        // При загрузке страницы сразу берем данные из Python
        async function loadHistory() {
            const container = document.getElementById('historyList');
            try {
                // Запрашиваем данные из базы
                const response = await fetch('/api/history');
                const data = await response.json();

                container.innerHTML = ''; // Очищаем "Загрузку"

                if (data.length === 0) {
                    container.innerHTML = '<div style="text-align:center;">История пуста</div>';
                    return;
                }

                // Создаем карточку для каждой записи
                data.forEach(item => {
                    const date = new Date(item.timestamp).toLocaleString();
                    const html = `
                        <div class="card">
                            <div class="meta">
                                <span>ID: ${item.id}</span>
                                <span>📅 ${date}</span>
                            </div>
                            <div class="query">🔍 ${item.user_query}</div>
                            <div class="response">${item.ai_response}</div>
                        </div>
                    `;
                    container.innerHTML += html;
                });
            } catch (e) {
                container.innerHTML = 'Ошибка загрузки истории :(';
            }
        }

        loadHistory();
    </script>
</body>
</html>
